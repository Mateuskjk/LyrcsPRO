<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1C0900"/>
    </linearGradient>
    <radialGradient id="glow" cx="52%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#D4610A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4610A" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#D4610A" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Outer ring accent -->
  <rect width="512" height="512" rx="90" fill="none"
        stroke="#D4610A" stroke-width="3" opacity="0.3"/>

  <!-- Glow blob -->
  <ellipse cx="260" cy="210" rx="190" ry="165" fill="url(#glow)"/>

  <!-- ── Music note ── -->
  <!-- Head -->
  <ellipse cx="195" cy="298" rx="58" ry="44"
           fill="#D4610A" filter="url(#shadow)"
           transform="rotate(-18 195 298)"/>
  <!-- Inner highlight on head -->
  <ellipse cx="182" cy="288" rx="22" ry="16"
           fill="#FF8C3A" opacity="0.45"
           transform="rotate(-18 182 288)"/>
  <!-- Stem -->
  <rect x="245" y="110" width="20" height="196" rx="10" fill="#D4610A"/>
  <!-- Beam / flag -->
  <path d="M265 110 C355 128 380 195 315 248"
        stroke="#D4610A" stroke-width="22"
        fill="none" stroke-linecap="round"/>
  <!-- Beam tip dot -->
  <circle cx="315" cy="248" r="11" fill="#D4610A"/>

  <!-- ── Horizontal lines (staff) subtle ── -->
  <line x1="100" y1="345" x2="412" y2="345" stroke="#D4610A" stroke-width="2" opacity="0.18"/>
  <line x1="116" y1="362" x2="396" y2="362" stroke="#D4610A" stroke-width="2" opacity="0.12"/>

  <!-- ── App name ── -->
  <text x="256" y="424"
        text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-weight="700" font-size="74" letter-spacing="-1">
    <tspan fill="#FFFFFF">Lyrics</tspan><tspan fill="#D4610A">Pro</tspan>
  </text>

  <!-- Tagline -->
  <text x="256" y="462"
        text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-weight="400" font-size="22" letter-spacing="5"
        fill="#444444">
    PRESENTATION
  </text>
</svg>
